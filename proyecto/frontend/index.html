<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD de Clientes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Gestión de Clientes</h1>

  <form id="formCliente">
    <input type="number" id="cust_num" placeholder="ID Cliente" required />
    <input type="text" id="company" placeholder="Empresa" required />
    <input type="number" id="cust_rep" placeholder="ID Representante" required />
    <input type="number" step="0.01" id="credit_limit" placeholder="Límite de crédito" required />
    <button type="submit" id="btnGuardar">Guardar</button>
    <button type="button" id="btnCancelar" style="display: none;">Cancelar</button>
  </form>

  <p id="mensaje"></p>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Empresa</th>
        <th>Representante</th>
        <th>Límite de crédito</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaClientes"></tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
